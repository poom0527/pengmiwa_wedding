<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PENG　& MIWA WEDDING</title>

<style>
  :root{
    --bg:#f5f7eb;
    --ink:#e47a21;

    --maxw:1120px;
    --gutter-desktop:70px;
    --gutter-mobile:10px;

    --logo-in: 1s;
    --logo-hold: 0.8s;
    --logo-out: 0.8s;

    --words-in: 3.0s;
    --words-stagger: .35s;
    --words-shift:.22;

    --gap-hero-message: 300px;
    --gap-message-date: 500px;
    --gap-date-access: 300px;
    --gap-access-allergy: 300px;
    --gap-allergy-barefoot: 300px;
    --gap-barefoot-rsvp: 300px;

    --thanks-text-maxw: 570px;
    --lastname-maxw:    400px;
    --line-gap:         14px;
    --thanks-words-offset-y: -270px;
    --lastname-offset-y:     445px;
    --thanks-in: var(--words-in);
    --thanks-stagger: var(--words-stagger);
  }

  *{ box-sizing:border-box }
  html{ scroll-behavior:smooth }
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    line-height:1.7; overflow-x:hidden;
  }

  /* Intro */
  .intro{ position:fixed; inset:0; z-index:200; background:#fff; display:grid; place-items:center; opacity:1; transition:opacity var(--logo-out) ease; }
  .intro.hidden{ opacity:0; pointer-events:none; }
  .intro-logo{ width:clamp(84px, 12vw, 140px); height:auto; opacity:0; transform:scale(.96);
    animation: logoIntro calc(var(--logo-in) + var(--logo-hold) + var(--logo-out)) ease forwards; }
  @keyframes logoIntro{
    0%{opacity:0; transform:scale(.96)}
    30%{opacity:1; transform:scale(1)}
    70%{opacity:1; transform:scale(1)}
    100%{opacity:0; transform:scale(1)}
  }

  /* HERO */
  .hero{ position:relative; z-index:10; margin:0; padding:0; min-height:70vh; opacity:0; transform:translateY(8px);
    transition:opacity 1.1s ease, transform 1.1s ease; overflow:hidden; width:100vw; margin-left:calc(50% - 50vw); }
  .hero.show{ opacity:1; transform:none; }
  .hero-img{ display:block; width:calc(100% + 2px); max-width:none; margin-left:-1px; height:auto; }

  .words-wrap{ position:absolute; inset:0 0 auto 0; display:flex; justify-content:center; pointer-events:none; opacity:0;
    transform:translateY(8px); transition:opacity .8s ease, transform .8s ease; width:100%; }
  .words-wrap.show{ opacity:1; transform:none; }
  .words-inner{ width:100%; max-width:none; padding-inline:5vw; transform:translateY(var(--words-ty,0px)); will-change:transform;
    display:flex; flex-direction:column; align-items:center; gap:8px; }
  .word{ display:block; width:100%; height:auto; opacity:0; transform:translateY(10px); }
  .words-wrap.show .word{ animation: wordFade var(--words-in) ease forwards; }
  .words-wrap.show .word:nth-child(1){ animation-delay: calc(var(--words-stagger) * 0); }
  .words-wrap.show .word:nth-child(2){ animation-delay: calc(var(--words-stagger) * 1); }
  .words-wrap.show .word:nth-child(3){ animation-delay: calc(var(--words-stagger) * 2); }
  @keyframes wordFade{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:none}}

  /* Layout */
  section{ padding:0 }
  .block{ max-width:var(--maxw); margin:0 auto; padding-inline:var(--gutter-desktop) }
  .png{ display:block; width:100%; height:auto }
  .gap{ height:var(--h, 60px) }

  /* Map */
  .map-embed{ margin-top:60px; border-radius:16px; overflow:hidden; box-shadow:0 4px 12px rgba(0,0,0,.1) }
  .map-link{ text-align:center; margin-top:12px }
  .map-link a{ color:var(--ink); font-weight:600; text-decoration:underline }

  /* RSVP form */
  .rsvp{ position:relative; z-index:1 }
  .rsvp-form{ width:100%; max-width:none; margin:0; display:grid; gap:18px; }
  .form-group{ display:flex; flex-direction:column; gap:6px }
  .label{ font-weight:700; color:#db7929; line-height:1.3; font-size:18px }
  .input, .textarea{ width:100%; padding:12px 14px; border-radius:12px; border:1px solid rgba(0,0,0,.16); background:#fff; font-size:15px; outline:none; }
  .textarea{ min-height:120px; resize:vertical }
  .boxed{ border:1px solid rgba(0,0,0,.12); border-radius:14px; padding:14px; background:#fff; }
  .checks{ display:grid; grid-template-columns:repeat(4, minmax(0,1fr)); gap:8px 14px; margin:6px 0 8px }
  .check{ display:flex; align-items:center; gap:8px; font-size:18px }
  input[type="checkbox"], input[type="radio"]{ accent-color:var(--ink) }
  .btns{ display:flex; justify-content:center; margin-top:8px; margin-bottom:200px; }
  .btn{ appearance:none; border:none; border-radius:999px; background:var(--ink); color:#fff; font-weight:800; box-shadow:0 6px 16px rgba(0,0,0,.12);
    cursor:pointer; transition:transform .05s ease, opacity .2s ease; padding: 15px 35px; font-size: 20px; }
  .btn:hover{ opacity:.9 } .btn:active{ transform:translateY(1px) }

  /* THANK YOU */
  #thanks{ position:fixed; inset:0; z-index:9999; display:none; opacity:0; transition:opacity .6s ease; background:var(--bg);
    align-items:flex-start; justify-content:center; overflow:auto; }
  #thanks.show{ display:flex; opacity:1; }
  .thanks-inner{ width:100%; max-width:none; }
  .thanks-media{ position:relative; }
  .thanks-img{ display:block; width:100%; max-width:1200px; margin:40px auto 0; border-radius:24px; box-shadow:0 10px 30px rgba(0,0,0,0.15); }
  .thanks-words{ position:absolute; left:50%; top:50%; transform: translate(-50%,-50%) translateY(var(--thanks-words-offset-y));
    display:flex; flex-direction:column; align-items:center; gap: var(--line-gap); width:100%; pointer-events:none; z-index:2; }
  .thanks-words .tline{ display:block; width:100%; max-width: var(--thanks-text-maxw); height:auto; margin:0 auto; opacity:0; transform: translateY(10px); }
  .lastname{ position:absolute; left:50%; top:50%; width:100%; max-width: var(--lastname-maxw); height:auto; margin:0 auto; pointer-events:none; z-index:3; opacity:0;
    transform: translate(-50%,-50%) translateY(var(--lastname-offset-y)) translateY(10px); }
  #thanks.show .thanks-words .tline{ animation: wordFadeTY var(--thanks-in) ease forwards; }
  #thanks.show .thanks-words .tline:nth-child(1){ animation-delay: calc(var(--thanks-stagger) * 0); }
  #thanks.show .thanks-words .tline:nth-child(2){ animation-delay: calc(var(--thanks-stagger) * 1); }
  #thanks.show .thanks-words .tline:nth-child(3){ animation-delay: calc(var(--thanks-stagger) * 2); }
  #thanks.show .lastname{ animation: wordFadeLast var(--thanks-in) ease forwards; animation-delay: calc(var(--thanks-stagger) * 3); }
  @keyframes wordFadeTY{ 0%{ opacity:0; transform: translateY(10px); } 100%{ opacity:1; transform: translateY(0); } }
  @keyframes wordFadeLast{ 0%{ opacity:0; transform: translate(-50%,-50%) translateY(var(--lastname-offset-y)) translateY(10px); } 100%{ opacity:1; transform: translate(-50%,-50%) translateY(var(--lastname-offset-y)) translateY(0); } }
  .thanks-panel{ background:var(--bg); border-radius:0 0 12px 12px; padding: clamp(24px, 5vw, 48px) clamp(20px, 4vw, 40px);
    display:flex; flex-direction:column; align-items:center; gap: clamp(24px, 4vw, 36px); }

  /* Fadeup */
  .fadeup{ opacity:0; transform:translateY(30px); transition: opacity 1s ease, transform 1s ease; }
  .fadeup.show{ opacity:1; transform:translateY(0); }

  /* === Language toggle (JP/EN) ===
     右端・画面中央、縦並び。現在言語=オレンジ、他は灰色文字。初期は非表示、HEROを過ぎたら表示。 */
  .lang-toggle{
    position:fixed; right:14px; top:50%; transform:translateY(-50%);
    z-index:1000; display:flex; flex-direction:column; gap:10px;
    opacity:0; pointer-events:none; transition:opacity .3s ease;
  }
  .lang-toggle.show{ opacity:1; pointer-events:auto; }
  /* Language toggle (this page is EN): right-center column */
  .lang-toggle{
    position:fixed; right:40px; top:50%; transform:translateY(-50%);
    z-index:1000; display:flex; flex-direction:column; gap:10px;
    opacity:0; pointer-events:none; transition:opacity .3s ease;
  }
  .lang-toggle.show{ opacity:1; pointer-events:auto; }
.lang-toggle a {
  text-decoration: none;
  border: none;
  background: none;      /* 背景なし */
  font-weight: 800;
  font-size: 22px;       /* 必要なら調整 */
  color: #999;           /* デフォルトは灰色 */
  cursor: pointer;
  padding: 0;            /* 余白なしで文字のみ */
}

.lang-toggle a.on {
  color: var(--ink);     /* 選択中はオレンジ */
}

.lang-toggle a.off {
  color: #999;           /* 未選択は灰色 */
}

  /* Attendance inline */
  .form-group.attend-inline{ display:flex; flex-direction:row !important; justify-content:center; align-items:center; gap:200px; font-size:24px; margin-bottom:10px; }
  .form-group.attend-inline .check{ display:flex; align-items:center; font-size:inherit; font-weight:700; }

  /* Hide helper */
  .hide{ display:none !important; }

  @media (max-width:720px){
    .block{ padding-inline:var(--gutter-mobile) }
    :root{ --thanks-text-maxw:82vw; --lastname-maxw:50vw; --line-gap:10px; --thanks-words-offset-y:-120px; --lastname-offset-y:-150px; }
  }
  @media (prefers-reduced-motion: reduce){
    #thanks.show .thanks-words .tline, #thanks.show .lastname{ animation:none; opacity:1; }
  }
</style>
</head>
<body>

<nav class="lang-toggle" id="langToggle" aria-label="Language">
  <a href="./index.html" class="on"  lang="ja" aria-current="page">JP</a>
  <a href="./english.html" class="off" lang="en">EN</a>
</nav>


  <!-- Intro -->
  <div class="intro" id="intro" aria-hidden="true">
    <img class="intro-logo" src="images/logo.png" alt="MIWA & PENG">
  </div>

  <!-- HERO -->
  <section class="hero" id="hero" aria-label="Hero">
    <img id="heroImg" class="hero-img" src="images/hero.png" alt="Header Photo" decoding="async" />
    <div class="words-wrap" id="wordsWrap">
      <div class="words-inner" id="wordsInner">
        <img class="word" src="images/words_tw.png" alt="We are getting married (TW)">
        <img class="word" src="images/words_jp.png" alt="We are getting married (JP)">
        <img class="word" src="images/words_en.png" alt="WE ARE GETTING MARRIED">
      </div>
    </div>
  </section>

  <div class="gap" style="--h: var(--gap-hero-message)"></div>

  <!-- Sections (EN images — 既存の英語ファイル名に置き換えてください) -->
  <section id="message" class="fadeup">
    <div class="block"><img class="png" src="images/message_en.png" alt="Message" loading="lazy" decoding="async"></div>
  </section>

  <div class="gap" style="--h: var(--gap-message-date)"></div>

  <section id="date" class="fadeup">
    <div class="block"><img class="png" src="images/date_en.png" alt="Date & Time" loading="lazy" decoding="async"></div>
  </section>

  <div class="gap" style="--h: var(--gap-date-access)"></div>

  <section id="access" class="fadeup">
    <div class="block">
      <img class="png" src="images/map_en.png" alt="Map" loading="lazy" decoding="async">
      <div class="map-embed">
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3240.8289394692586!2d139.73018631525834!3d35.65858098019967!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x60188b8574b5c63d%3A0x2a76b9ec61f1debb!2z44CSMTA2LTAwNDIg5p2x5Lqs6YO95riv5Yy66KW_5Y2X5Lqs77yS5LiB55uu77yR77yX77yW!5e0!3m2!1sja!2sjp!4v1693123456789!5m2!1sja!2sjp"
          width="100%" height="450" style="border:0;" allowfullscreen loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>
      <p class="map-link"><a href="https://goo.gl/maps/SbEgLUBmTDZBhB1X8" target="_blank" rel="noopener">Open Google Maps</a></p>
    </div>
  </section>

  <div class="gap" style="--h: var(--gap-access-allergy)"></div>

  <section id="allergy" class="fadeup">
    <div class="block">
      <img class="png" src="images/allergy_en.png" alt="Food allergies" loading="lazy" decoding="async">
    </div>
  </section>

  <div class="gap" style="--h: var(--gap-allergy-barefoot)"></div>

  <section id="barefoot" class="fadeup">
    <div class="block">
      <img class="png" src="images/barefoot_en.png" alt="Barefoot request" loading="lazy" decoding="async">
    </div>
  </section>

  <div class="gap" style="--h: var(--gap-barefoot-rsvp)"></div>

  <!-- RSVP (EN) — Kana & Parking are hidden -->
  <section id="rsvp" class="rsvp fadeup">
    <div class="block">
      <img src="images/rsvp_en.png" alt="RSVP" class="png">
    </div>

    <div class="block">
      <form class="rsvp-form" id="rsvpForm" novalidate>
        <input type="hidden" name="_subject" value="Wedding RSVP from Website" />
        <input type="text" name="_gotcha" style="display:none" aria-hidden="true" />

        <div class="form-group attend-inline">
          <label class="check">
            <input type="radio" name="attendance" id="attendYes" value="Attending" required>
            Attending
          </label>
          <label class="check">
            <input type="radio" name="attendance" id="attendNo" value="Not attending" required>
            Not attending
          </label>
        </div>

        <div class="form-group">
          <label class="label" for="name">Name</label>
          <input id="name" name="name" type="text" class="input" required>
        </div>

        <!-- Name (phonetic) — hidden on EN page -->
        <div class="form-group hide">
          <label class="label" for="nameKana">Name (phonetic)</label>
          <input id="nameKana" name="nameKana" type="text" class="input">
        </div>

        <div class="form-group">
          <label class="label" id="allergyLabel">Food allergies</label>
          <div class="boxed" role="group" aria-labelledby="allergyLabel">
            <div class="checks">
              <label class="check"><input type="checkbox" name="allergyList" value="Shrimp">Shrimp</label>
              <label class="check"><input type="checkbox" name="allergyList" value="Crab">Crab</label>
              <label class="check"><input type="checkbox" name="allergyList" value="Walnut">Walnut</label>
              <label class="check"><input type="checkbox" name="allergyList" value="Wheat">Wheat</label>
              <label class="check"><input type="checkbox" name="allergyList" value="Buckwheat">Buckwheat</label>
              <label class="check"><input type="checkbox" name="allergyList" value="Egg">Egg</label>
              <label class="check"><input type="checkbox" name="allergyList" value="Milk">Milk</label>
              <label class="check"><input type="checkbox" name="allergyList" value="Peanut">Peanut</label>
            </div>

            <label for="allergyOther" class="label" style="margin-top:8px;">Other requests</label>
            <textarea id="allergyOther" name="allergyOther" class="textarea"
                      placeholder="If you have any other concerns, please let us know here."></textarea>
          </div>
        </div>

        <!-- Parking — hidden on EN page -->
        <div class="form-group hide">
          <label class="label" id="parkingLabel" for="parking">Parking</label>
          <div class="boxed" role="group" aria-labelledby="parkingLabel">
            <label class="check" style="margin-top:2px;">
              <input type="checkbox" id="parking" name="parking" value="Needed">
              Please check here if you need a parking space.
            </label>
          </div>
        </div>

        <div class="form-group">
          <label class="label" for="message">Message (questions, etc.)</label>
          <textarea id="message" name="message" class="textarea"
            placeholder="If you have any questions for us, feel free to write them here!"></textarea>
        </div>

        <div class="btns">
          <button type="submit" class="btn" id="submitBtn">Send</button>
        </div>
      </form>
    </div>
  </section>

  <!-- THANK YOU -->
  <div id="thanks" aria-hidden="true">
    <div class="thanks-inner">
      <div class="thanks-media">
        <img class="thanks-img" src="images/hero2.jpg" alt="Thank you">
        <div class="thanks-words">
          <img class="tline" src="images/seeyousoon_tw.png" alt="TW see you soon">
          <img class="tline" src="images/seeyousoon_jp.png" alt="JP see you soon">
          <img class="tline" src="images/seeyousoon_eg.png" alt="SEE YOU SOON">
        </div>
        <img class="lastname" src="images/lastname.png" alt="Names">
      </div>
      <div class="thanks-panel" aria-hidden="true"></div>
    </div>
  </div>

<script>
/* Intro → HERO */
(function(){
  const intro  = document.getElementById('intro');
  const hero   = document.getElementById('hero');
  const words  = document.getElementById('wordsWrap');
  const toggle = document.getElementById('langToggle'); // ← 追加

  function sec(varName){
    const v = getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
    return parseFloat(v || '0');
  }
  const total = (sec('--logo-in') + sec('--logo-hold') + sec('--logo-out')) * 1000;

  window.addEventListener('load', () => {
    setTimeout(() => {
      hero.classList.add('show');
      intro.classList.add('hidden');
      intro.addEventListener('transitionend', () => { intro.style.display = 'none'; }, { once:true });

      // ここで一度だけ表示し、その後はずっと表示のまま
      setTimeout(() => {
        words.classList.add('show');
        toggle?.classList.add('show');
      }, 1000);

    }, total - sec('--logo-out')*1000 + 100);
  });
})();


/* Words parallax */
(function(){
  const hero = document.getElementById('hero');
  const heroImg = document.getElementById('heroImg');
  const wordsInner = document.getElementById('wordsInner');
  function getHeroHeight(){ return Math.max(hero.offsetHeight, heroImg.clientHeight||0, window.innerHeight*0.6, 1); }
  function update(){
    const h=getHeroHeight(), y=window.scrollY, top=hero.offsetTop;
    const progress = Math.min(Math.max((y-top)/h,0),1);
    const ratio = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--words-shift')) || .22;
    wordsInner.style.setProperty('--words-ty', (h * ratio * progress) + 'px');
  }
  window.addEventListener('scroll', ()=>requestAnimationFrame(update), { passive:true });
  window.addEventListener('resize', update);
  if (heroImg.complete) update(); else heroImg.addEventListener('load', update, { once:true });
})();

/* Fadeup */
(function(){
  const targets = document.querySelectorAll('.fadeup');
  const observer = new IntersectionObserver((entries, obs)=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){ entry.target.classList.add('show'); obs.unobserve(entry.target); }
    });
  }, { threshold: 0.2 });
  targets.forEach(el=> observer.observe(el));
})();



/* Form submit (same endpoint / same thank-you) */
(function(){
  const form = document.getElementById('rsvpForm');
  const submitBtn = document.getElementById('submitBtn');
  const thanks = document.getElementById('thanks');
  const FORM_ENDPOINT = 'https://formspree.io/f/xblaordo';

  function getAllergies(){
    const arr = Array.from(document.querySelectorAll('input[name="allergyList"]:checked')).map(el=>el.value);
    return arr.length ? arr.join(', ') : 'None';
  }
  function getAttendance(){
    const el = form.querySelector('input[name="attendance"]:checked');
    return el ? el.value : '';
  }

  form?.addEventListener('submit', async (e)=>{
    e.preventDefault();
    if (form.querySelector('input[name="_gotcha"]').value){ return; }

    const attendance = getAttendance();
    const payload = {
      Attendance: attendance || 'Not selected',
      Name:       form.name.value.trim(),
      Allergies:  getAllergies(),
      'Other requests': (form.allergyOther?.value || '').trim() || 'None',
      Message:    (form.message?.value || '').trim() || '(empty)',
      _subject:   form.querySelector('input[name="_subject"]').value || 'Wedding RSVP from Website'
    };

    if (!payload.Attendance){ alert('Please select your attendance.'); return; }
    if (!payload.Name){ alert('Please enter your name.'); return; }

    submitBtn.disabled = true; const original = submitBtn.textContent; submitBtn.textContent = 'Sending…';
    try{
      let res = await fetch(FORM_ENDPOINT,{ method:'POST', headers:{'Accept':'application/json','Content-Type':'application/json'}, body:JSON.stringify(payload) });
      if (!res.ok){
        const fd = new FormData(); Object.entries(payload).forEach(([k,v])=> fd.append(k,v));
        res = await fetch(FORM_ENDPOINT,{ method:'POST', body:fd, headers:{'Accept':'application/json'} });
      }
      if (!res.ok) throw new Error('Failed to submit');

      thanks?.classList.add('show');
      thanks?.addEventListener('click', ()=> thanks.classList.remove('show'), { once:true });
      form.reset();
    }catch(err){ console.error(err); alert('Could not submit. Please try again later.'); }
    finally{ submitBtn.disabled=false; submitBtn.textContent=original; }
  });
})();
</script>
</body>
</html>
